<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore the delicious menu at The Golden Fork, featuring appetizers, main courses, desserts, and beverages.">
    <title>The Golden Fork - Menu</title>
        <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="menu-page">
    <header id="main-header"></header>

    <main>
        <section class="menu-section reveal">
            <h1 class="page-title">Our Menu</h1>
            <div class="menu-filters" id="menu-filters">
                <button data-category="All" class="active-filter">All</button>
                <button data-category="Appetizers">Appetizers</button>
                <button data-category="Mains">Main Courses</button>
                <button data-category="Desserts">Desserts</button>
                <button data-category="Beverages">Beverages</button>
            </div>
            <div class="menu-grid" id="menu-grid"></div>
        </section>
    </main>
        <div id="main-footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="layout.js"></script>
    <script src="script.js"></script>
</body>
</html>
