<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with The Golden Fork. Send us a message for inquiries or feedback.">
    <title>The Golden Fork - Contact</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="contact-page">

    <header id="main-header"></header>

    <main>        <section class="contact-section reveal">
            <form class="contact-form" action="https://formspree.io/f/myzjpoln" method="POST">
                <h1 class="page-title">Get in Touch</h1>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" rows="6" required placeholder="Your inquiries, feedback, or reservation requests..."></textarea>
                </div>
                <div class="form-action">
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </div>
            </form>
        </section>
    </main>
    
    <div id="main-footer"></div>
    

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="layout.js"></script>
    <script src="script.js"></script>
</body>
</html>
